<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>2ndNumber Contacts</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="header">
        <div class="brand">
          <img src="../icons/icon32.png" alt="" class="brand-logo" />
          <div class="brand-text">
            <div class="brand-title">2ndNumber</div>
            <div class="brand-sub">Contacts</div>
          </div>
        </div>
        <button class="icon-btn" id="openOptions" title="Open full manager" aria-label="Open full manager">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l10-10"/><path d="M9 7h8v8"/></svg>
        </button>
      </header>

      <section class="pending hidden" id="pendingCard">
        <div class="pending-pulse" aria-hidden="true"></div>
        <div class="pending-head">
          <span class="pending-tag">Incoming · accepted</span>
          <button class="link-btn" id="dismissPending">Dismiss</button>
        </div>
        <div class="pending-number" id="pendingNumber">—</div>
        <div class="pending-actions">
          <button class="btn btn-primary" id="savePending">Save as contact</button>
        </div>
      </section>

      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="contacts" role="tab">Contacts</button>
        <button class="tab" data-tab="history" role="tab">History</button>
      </nav>

      <section class="tab-panel" data-panel="contacts">
        <div class="toolbar">
          <div class="search">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input id="searchInput" type="search" placeholder="Search name, number, company…" autocomplete="off" />
          </div>
          <button class="btn btn-primary btn-sm" id="newContact">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            New
          </button>
        </div>
        <div class="list" id="contactsList"></div>
        <div class="empty hidden" id="contactsEmpty">
          <div class="empty-emoji">📇</div>
          <div class="empty-title">No contacts yet</div>
          <div class="empty-sub">Click <strong>New</strong> to add one, or accept a call on 2ndnumber.tel.</div>
        </div>
      </section>

      <section class="tab-panel hidden" data-panel="history">
        <div class="toolbar">
          <div class="muted small" id="historyCount"></div>
          <button class="btn btn-ghost btn-sm" id="clearHistory">Clear all</button>
        </div>
        <div class="list" id="historyList"></div>
        <div class="empty hidden" id="historyEmpty">
          <div class="empty-emoji">🔕</div>
          <div class="empty-title">No call history</div>
          <div class="empty-sub">Accepted and rejected calls will appear here.</div>
        </div>
      </section>
    </div>

    <!-- Edit drawer -->
    <div class="drawer-scrim hidden" id="drawerScrim"></div>
    <aside class="drawer hidden" id="drawer" aria-hidden="true">
      <header class="drawer-head">
        <h3 id="drawerTitle">New contact</h3>
        <button class="icon-btn" id="closeDrawer" aria-label="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12"/><path d="M18 6l-12 12"/></svg>
        </button>
      </header>
      <form id="contactForm" class="form" autocomplete="off">
        <input type="hidden" name="id" />
        <label class="field">
          <span>Phone number <em>*</em></span>
          <input name="phone" type="tel" required placeholder="(555) 123-4567" />
          <small class="error" data-error="phone"></small>
        </label>
        <label class="field">
          <span>Name <em>*</em></span>
          <input name="name" type="text" required placeholder="Jane Doe" />
          <small class="error" data-error="name"></small>
        </label>
        <label class="field">
          <span>Role</span>
          <select name="role">
            <option value="">—</option>
            <option value="recruiter">Recruiter</option>
            <option value="hiring_manager">Hiring Manager</option>
          </select>
        </label>
        <label class="field">
          <span>Company</span>
          <input name="company" type="text" placeholder="Acme Inc." />
        </label>
        <label class="field">
          <span>Client name</span>
          <input name="clientName" type="text" placeholder="Optional" />
        </label>
        <div class="field-row">
          <label class="field">
            <span>Step</span>
            <select name="step">
              <option value="">—</option>
              <option value="HR">HR</option>
              <option value="Tech">Tech</option>
              <option value="Final">Final</option>
            </select>
          </label>
          <label class="field">
            <span>Round</span>
            <select name="round">
              <option value="">—</option>
              <option>1</option><option>2</option><option>3</option><option>4</option>
              <option>5</option><option>6</option><option>7</option>
            </select>
          </label>
        </div>
        <small class="error global" data-error="_"></small>
        <footer class="drawer-foot">
          <button type="button" class="btn btn-ghost" id="deleteContact" hidden>Delete</button>
          <div class="spacer"></div>
          <button type="button" class="btn btn-ghost" id="cancelDrawer">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </footer>
      </form>
    </aside>

    <div class="toast hidden" id="toast"></div>

    <script src="../utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
